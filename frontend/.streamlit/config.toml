[theme]
primaryColor = "blue"
backgroundColor = "white"
secondaryBackgroundColor = "white"
textColor = "darkblue"
font = "sans serif"

[server]
maxUploadSize = 10
enableXsrfProtection = false
enableCORS = false
headless = true

[browser]
gatherUsageStats = false

[client]
showSidebarNavigation = true
toolbarMode = "minimal"